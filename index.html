<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Little Luxury</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
            background-color: #fff;
            margin: 0;
            padding: 20px;
        }
        .checkout-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px;
        }
        .brand-header {
            text-align: center;
            font-size: 26px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 400;
            border-bottom: 1px solid #e1e1e1;
            padding-bottom: 20px;
        }
        .section-title {
            font-size: 18px;
            margin: 25px 0 15px 0;
            font-weight: 500;
        }
        .input-group {
            margin-bottom: 12px;
        }
        input[type="text"], input[type="email"], input[type="tel"], select {
            width: 100%;
            padding: 13px;
            border: 1px solid #d9d9d9;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            border-color: #000;
            outline: none;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row .input-group {
            flex: 1;
        }
        .payment-box {
            border: 1px solid #d9d9d9;
            border-radius: 5px;
            padding: 15px;
            margin-top: 15px;
            background-color: #fcfcfc;
        }
        .payment-option {
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 14px;
        }
        .payment-option input {
            margin-right: 10px;
        }
        .payment-desc {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            padding-left: 24px;
        }
        .order-summary {
            background: #fafafa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            border: 1px solid #e1e1e1;
        }
        .btn-pay {
            width: 100%;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 25px;
            letter-spacing: 1px;
            transition: background 0.3s;
            text-transform: uppercase;
        }
        .btn-pay:hover {
            background-color: #222;
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <div class="brand-header">LITTLE LUXURY</div>

    <div class="order-summary">
        <span>Total (1 Item)</span>
        <span>₹16,500.00</span>
    </div>

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        
        <input type="hidden" name="_subject" value="New Order Placed - Little Luxury!">
        <input type="hidden" name="Ordered_Item" value="Premium Clothing Item (Custom)">
        <input type="hidden" name="Order_Total" value="₹16,500.00">
        
        <input type="hidden" name="_next" value="https://pages.razorpay.com/your_custom_payment_link">

        <div class="section-title">Contact</div>
        <div class="input-group">
            <input type="email" name="Customer_Email" placeholder="Email" required>
        </div>

        <div class="section-title">Delivery</div>
        <div class="input-group">
            <select name="Country">
                <option value="India">India</option>
            </select>
        </div>
        
        <div class="row">
            <div class="input-group"><input type="text" name="First_Name" placeholder="First name" required></div>
            <div class="input-group"><input type="text" name="Last_Name" placeholder="Last name" required></div>
        </div>

        <div class="input-group">
            <input type="text" name="Address" placeholder="Address" required>
        </div>
        <div class="input-group">
            <input type="text" name="Apartment_Suite" placeholder="Apartment, suite, etc. (optional)">
        </div>

        <div class="row">
            <div class="input-group"><input type="text" name="City" placeholder="City" required></div>
            <div class="input-group"><input type="text" name="State" placeholder="State" value="Maharashtra" required></div>
            <div class="input-group"><input type="text" name="PIN_code" placeholder="PIN code" required></div>
        </div>

        <div class="input-group">
            <input type="tel" name="Phone_Number" placeholder="Phone" required>
        </div>

        <div class="section-title">Payment</div>
        <div class="payment-box">
            <div class="payment-option">
                <input type="radio" name="Payment_Method" value="Instant UPI / Card" checked> 
                <strong>Razorpay Secure (UPI, Cards, Wallets)</strong>
            </div>
            <div class="payment-desc">
                After clicking "Pay now", your shipping details will be saved, and you will be safely redirected to complete your secure transaction.
            </div>
        </div>

        <button type="submit" class="btn-pay">Pay now</button>
    </form>
</div>

</body>
</html>
